name: taasim

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: taasim-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=${KAFKA_CLUSTER_ID:-ZWFhOWQ5ZjAtY2Q5Ny00Yjc0LWExODktNDMwNWI4ZmFhMjA0}
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 30s
    mem_limit: 768m
    cpus: 0.75
    networks:
      - taasim-net

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: taasim-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 20s
    mem_limit: 512m
    cpus: 0.5
    networks:
      - taasim-net

  cassandra:
    image: cassandra:4.1.6
    container_name: taasim-cassandra
    ports:
      - "${CASSANDRA_CQL_PORT:-9042}:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=taasim-cluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - MAX_HEAP_SIZE=768M
      - HEAP_NEWSIZE=256M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 50s
    mem_limit: 1200m
    cpus: 1.0
    networks:
      - taasim-net

  flink-jobmanager:
    image: flink:1.20.0-scala_2.12-java11
    container_name: taasim-flink-jobmanager
    command: >
      bash -lc "
      set -e;
      test -f /opt/flink/lib/hadoop-aws-3.3.4.jar || wget -q -O /opt/flink/lib/hadoop-aws-3.3.4.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar;
      test -f /opt/flink/lib/aws-java-sdk-bundle-1.12.262.jar || wget -q -O /opt/flink/lib/aws-java-sdk-bundle-1.12.262.jar https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar;
      /docker-entrypoint.sh jobmanager"
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: ${FLINK_PARALLELISM_DEFAULT:-1}
        s3.endpoint: http://minio:${MINIO_PORT:-9000}
        s3.path.style.access: true
        s3.access-key: ${MINIO_ROOT_USER:-minioadmin}
        s3.secret-key: ${MINIO_ROOT_PASSWORD:-minioadmin123}
        state.backend: filesystem
        state.checkpoints.dir: s3a://checkpoints/flink
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "flink list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 40s
    mem_limit: 1024m
    cpus: 1.0
    networks:
      - taasim-net

  flink-taskmanager:
    image: flink:1.20.0-scala_2.12-java11
    container_name: taasim-flink-taskmanager
    command: >
      bash -lc "
      set -e;
      test -f /opt/flink/lib/hadoop-aws-3.3.4.jar || wget -q -O /opt/flink/lib/hadoop-aws-3.3.4.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar;
      test -f /opt/flink/lib/aws-java-sdk-bundle-1.12.262.jar || wget -q -O /opt/flink/lib/aws-java-sdk-bundle-1.12.262.jar https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar;
      /docker-entrypoint.sh taskmanager"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        s3.endpoint: http://minio:${MINIO_PORT:-9000}
        s3.path.style.access: true
        s3.access-key: ${MINIO_ROOT_USER:-minioadmin}
        s3.secret-key: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    mem_limit: 1024m
    cpus: 1.0
    networks:
      - taasim-net

  spark-master:
    image: apache/spark:3.5.1
    container_name: taasim-spark-master
    command: >
      bash -lc "
      set -e;
      test -f /opt/spark/jars/hadoop-aws-3.3.4.jar || curl -fsSL https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar -o /opt/spark/jars/hadoop-aws-3.3.4.jar;
      test -f /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar || curl -fsSL https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar -o /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar;
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080"
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_MASTER_UI_PORT:-8080}:8080"
    environment:
      - SPARK_LOCAL_HOSTNAME=spark-master
      - SPARK_DAEMON_MEMORY=${SPARK_DAEMON_MEMORY:-1g}
      - SPARK_EXTRA_CLASSPATH=/opt/spark/jars/hadoop-aws-3.3.4.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar
      - SPARK_MASTER_OPTS=-Dspark.hadoop.fs.s3a.endpoint=http://minio:${MINIO_PORT:-9000} -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER:-minioadmin} -Dspark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD:-minioadmin123} -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false
      - SPARK_SUBMIT_OPTS=-Dspark.hadoop.fs.s3a.endpoint=http://minio:${MINIO_PORT:-9000} -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER:-minioadmin} -Dspark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD:-minioadmin123} -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "/opt/spark/bin/spark-submit --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 50s
    mem_limit: 1024m
    cpus: 1.0
    networks:
      - taasim-net

  spark-worker:
    image: apache/spark:3.5.1
    container_name: taasim-spark-worker
    command: >
      bash -lc "
      set -e;
      test -f /opt/spark/jars/hadoop-aws-3.3.4.jar || curl -fsSL https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar -o /opt/spark/jars/hadoop-aws-3.3.4.jar;
      test -f /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar || curl -fsSL https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar -o /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar;
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --webui-port 8082 spark://spark-master:7077"
    depends_on:
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - SPARK_LOCAL_HOSTNAME=spark-worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-1G}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-1}
      - SPARK_EXTRA_CLASSPATH=/opt/spark/jars/hadoop-aws-3.3.4.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar
      - SPARK_DAEMON_JAVA_OPTS=-Dspark.hadoop.fs.s3a.endpoint=http://minio:${MINIO_PORT:-9000} -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER:-minioadmin} -Dspark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD:-minioadmin123} -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false
      - SPARK_SUBMIT_OPTS=-Dspark.hadoop.fs.s3a.endpoint=http://minio:${MINIO_PORT:-9000} -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER:-minioadmin} -Dspark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD:-minioadmin123} -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false
    mem_limit: 768m
    cpus: 0.75
    networks:
      - taasim-net

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    container_name: taasim-kafka-connect
    ports:
      - "${KAFKA_CONNECT_PORT:-8083}:8083"
    environment:
      - CONNECT_BOOTSTRAP_SERVERS=kafka:19092
      - CONNECT_REST_ADVERTISED_HOST_NAME=kafka-connect
      - CONNECT_REST_PORT=8083
      - CONNECT_GROUP_ID=taasim-connect-cluster
      - CONNECT_CONFIG_STORAGE_TOPIC=_connect-configs
      - CONNECT_OFFSET_STORAGE_TOPIC=_connect-offsets
      - CONNECT_STATUS_STORAGE_TOPIC=_connect-status
      - CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_STATUS_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_KEY_CONVERTER=org.apache.kafka.connect.storage.StringConverter
      - CONNECT_VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE=false
      - CONNECT_INTERNAL_KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_INTERNAL_VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_PLUGIN_PATH=/usr/share/java,/usr/share/confluent-hub-components
      - CONNECT_PLUGIN_DISCOVERY=hybrid_warn
      - CONNECT_LOG4J_ROOT_LOGLEVEL=INFO
    command: >
      bash -lc "
      if [ ! -d /usr/share/confluent-hub-components/confluentinc-kafka-connect-s3 ]; then
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.9;
      fi;
      /etc/confluent/docker/run"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 50s
    mem_limit: 1024m
    cpus: 1.0
    networks:
      - taasim-net

  osrm-backend:
    image: osrm/osrm-backend:latest
    container_name: taasim-osrm
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./osrm_data:/data
    command: osrm-routed --algorithm ch /data/morocco-latest.osrm
    mem_limit: 1024m
    cpus: 1.0
    networks:
      - taasim-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: taasim-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=hadesarchitect-cassandra-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 40s
    mem_limit: 512m
    cpus: 0.5
    networks:
      - taasim-net

volumes:
  minio_data:
  cassandra_data:
  grafana_data:

networks:
  taasim-net:
    name: taasim-net